<script>
const stories = [{"name": "Gentille", "anon": true, "age": "14 лет", "loc": "Нумби, Южное Киву", "tags": ["перемещение", "разлучение с семьей", "приёмная семья"], "tagColors": ["coral", "amber", "teal"], "avatarBg": "#FBEAF0", "avatarColor": "#993556", "story": "Когда в ее деревне началась война, Жантий потерялась и осталась совсем одна — без родителей, без дома, без ничего. Сначала ее временно приютила местная женщина — незнакомка, которая просто не смогла пройти мимо. Потом сотрудники партнерской организации IRC нашли для нее постоянную опекуншу — 68-летнюю Фатуму из Нумби. Фатума уже много лет заботится о чужих детях. Сейчас у нее их восемь.\n\nЖантий называет Фатуму «бабушкой». Теперь у нее снова есть семья. Они вместе танцуют, играют в скакалку, ходят на мастер-классы по рукоделию в Дружественное детям пространство, созданное Международным комитетом спасения (IRC). А еще Жантий мечтает стать врачом: «Чтобы люди говорили: “Жантий тоже училась”».\n\nБлагодаря поддержке Европейского союза и IRC Фатума получает еду, деньги и наборы (одежда, обувь, посуда, зубные щетки). «Одна я бы не смогла помочь всем этим детям», — признается она.\n\nЖантий больше не одна. Но тысячи детей в ДР Конго всё еще ждут того же.", "outcome": "Благодаря помощи Международного комитета спасения (IRC) Жантий обрела постоянную опекуншу и безопасное место, где снова может чувствовать себя ребенком.", "source": "Международный комитет спасения (IRC)", "sourceShort": "IRC", "sourceColor": "#185FA5", "sourceBg": "#E6F1FB", "url": "https://www.rescue.org/eu/article/place-belong-one-teenagers-life-inside-drc-crisis"}, {"name": "Imani", "anon": false, "age": "42 года", "loc": "Нумби, Южное Киву", "tags": ["бывший комбатант", "психосоциальная помощь", "экономическая поддержка"], "tagColors": ["purple", "teal", "green"], "avatarBg": "#EEEDFE", "avatarColor": "#534AB7", "story": "Когда Имани с мужем ушли из армии, вернуться к мирной жизни оказалось труднее, чем она думала. Ее преследовали страх и жестокость прошлого. Чтобы справиться, она начала пить, ссориться с мужем и тратить деньги впустую.\n\nОднажды к ней домой пришли женщины из соседской группы поддержки — рассказать о своей программе. Так Имани узнала о центре, который работает при поддержке Международного комитета спасения (IRC) и Европейского Союза.\n\nСначала она получила психосоциальную помощь — место, где можно говорить и где ее понимают. Потом — обучение предпринимательству. А затем — небольшие деньги на развитие дела.\n\nТеперь Имани торгует шлепанцами. Ее маленький бизнес вырос, она зарабатывает достаточно, чтобы кормить девятерых детей и вкладываться в их будущее. Ее дети тоже прошли обучение в центре — те, кто был неуправляемым, стали дисциплинированными.\n\nИмани смогла начать заново. Но многие женщины в ДР Конго всё еще ждут такого же шанса.", "outcome": "Имани получила психосоциальную поддержку, обучение и деньги на развитие дела — и смогла начать жизнь заново.", "source": "Международный комитет спасения (IRC)", "sourceShort": "IRC", "sourceColor": "#185FA5", "sourceBg": "#E6F1FB", "url": "https://www.rescue.org/eu/article/meet-imani-42-year-old-congolese-woman-transforming-her-traumatic-past-through-community"}, {"name": "Rosine", "anon": false, "age": "17 лет", "loc": "Кашуга, Северное Киву", "tags": ["похищение", "плен", "воссоединение с семьей"], "tagColors": ["red", "red", "teal"], "avatarBg": "#FCEBEB", "avatarColor": "#A32D2D", "story": "Розин выросла в Кашуге, где насилие давно стало частью жизни. Когда начались убийства, семья бежала в соседний город. Вместе с матерью она вышла искать еду — и их обеих похитили. Мать отпустили. Розин полтора года провела в плену. Ее заставили стать «женой» боевика. Пленные готовили еду для солдат раз в два дня, но сами почти не ели. Когда Розин заикалась о возвращении домой и молила «мужа» выпустить ее на волю, он бил ее и запирал в комнате, где держал ее днями. За попытку сбежать их обещали убить.\n\nКогда ее «мужа» убили в бою, Розин упросила командира отпустить ее в больницу — она была беременна. Муж оставил ей 10 тысяч конголезских франков — 6 долларов. По дороге она встретила людей, которые знали ее семью. Розин решила бежать.\n\nСотрудники Международного комитета спасения (IRC) нашли ее, отвезли в больницу. Но ребенка спасти не удалось — случился выкидыш. С помощью IRC Розин разыскала родителей. Но они не обрадовались и сказали возвращаться туда, откуда пришла. Тогда сотрудники IRC поговорили с семьей, объяснили, что Розин пережила. И помогли им принять ее обратно.", "outcome": "Сотрудники Международного комитета спасения (IRC) помогли Розин выбраться, получить медицинскую помощь и вернуться в семью.", "source": "Международный комитет спасения (IRC)", "sourceShort": "IRC", "sourceColor": "#185FA5", "sourceBg": "#E6F1FB", "url": "https://www.rescue.org/uk/article/kidnapped-soldiers-15-these-brave-girls-escaped-find-their-families"}, {"name": "Carine", "anon": false, "age": "17 лет", "loc": "Северное Киву", "tags": ["похищение", "насильственный брак", "побег"], "tagColors": ["red", "red", "amber"], "avatarBg": "#FCEBEB", "avatarColor": "#A32D2D", "story": "Когда 15-летняя Карин возвращалась домой из школы, трое солдат уже ждали ее. «Они сказали, что любят меня, — вспоминает она. — Я ответила, что еще учусь и не могу пойти с ними». Ее избили и забрали. В плену ее насильно выдали замуж за солдата вдвое старше нее.\n\nЧетыре месяца ада. Карин думала о побеге каждый день. Но пленных никогда не оставляли одних. За ними всегда кто-то следил.\n\nКогда лагерь атаковали другие вооруженные люди, она побежала. Четыре дня она блуждала в лесу, расспрашивая людей, как вернуться домой. Так она узнала об организации, которая помогает находить родителей, — о Международном комитете спасения (IRC).\n\nСотрудники IRC отвезли ее в больницу. Там она узнала, что беременна. Позже она родила, но через три дня ребенок умер. С помощью IRC Карин нашла своих родителей.\n\n«Я не боюсь будущего, — говорит Карин. — Я хочу стать как мой учитель по шитью. Когда я научусь, я не буду бояться ничего».", "outcome": "После побега Карин получила медицинскую помощь и смогла воссоединиться с родителями благодаря Международному комитету спасения (IRC).", "source": "Международный комитет спасения (IRC)", "sourceShort": "IRC", "sourceColor": "#185FA5", "sourceBg": "#E6F1FB", "url": "https://www.rescue.org/uk/article/kidnapped-soldiers-15-these-brave-girls-escaped-find-their-families"}, {"name": "Alphonsine", "anon": false, "age": "65 лет", "loc": "Танганьика", "tags": ["перемещение", "пожилые", "лагерь ВПЛ"], "tagColors": ["amber", "gray", "coral"], "avatarBg": "#FAEEDA", "avatarColor": "#854F0B", "story": "«Я вынуждена бороться каждый день», — говорит 65-летняя Альфонсин.\n\nКогда в ее деревне Рутуку начались межобщинные конфликты, пигмеи убивали людей стрелами. Тем, кому повезло, отделались тяжелыми ранениями. Альфонсин бежала с пятью внуками. Им досталась хижина в лагере Катаника-2.\n\nЧтобы прокормить детей, она каждый день рубила дрова, продавала уголь или листья маниоки. Так она зарабатывала около 2000 конголезских франков (1,25 доллара) — на муку и жаркое. Потом случился пожар. Огонь уничтожил около 2000 хижин в лагере. Хижина Альфонсин сгорела дотла. Вместе с последними вещами семьи. В 65 лет она начинала заново — уже не первый раз.\n\nДетский фонд ООН (ЮНИСЕФ) выдал пострадавшим семьям самое необходимое. «Я получила ведро, канистру, мыло и стаканы, — говорит Альфонсин. — У нас ничего не было, так что эти вещи очень мне пригодились». Она не знает, сможет ли когда-нибудь вернуться в свою деревню.", "outcome": "После пожара в лагере Альфонсин получила от ЮНИСЕФ вещи первой необходимости.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/starting-all-over-again-65"}, {"name": "Ketia", "anon": false, "age": "16 лет", "loc": "Киншаса", "tags": ["уличный ребенок", "беременность", "защита детей"], "tagColors": ["coral", "pink", "teal"], "avatarBg": "#FAECE7", "avatarColor": "#993C1D", "story": "Кетиа жила на улице вместе с матерью целый год. Потом мать умерла, и Кетиа осталась совсем одна. На улице ее ждали постоянное насилие и жестокость. Никакой защиты, никакого взрослого рядом. Это привело к незапланированной беременности.\n\nТе, кто однажды заметил ее, сами когда-то были уличными детьми. Теперь они работают как парасоциальные работники — обученные специалисты при поддержке ЮНИСЕФ.\n\nОни направили Кетиа в медицинские службы, а затем в центр защиты детей в Киншасе. Там дети живут до месяца, пока их не вернут в семью, не передадут временным опекунам или в центры долгосрочной заботы. Каждого ребенка поощряют учиться или осваивать профессию. Кетиа получила шанс, которого у нее не было на улице.", "outcome": "Благодаря системе защиты детей при поддержке ЮНИСЕФ Кетиа попала в безопасное место и получила доступ к помощи.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/new-start-children-streets"}, {"name": "Honorine", "anon": false, "age": "10 лет", "loc": "Итури", "tags": ["перемещение", "лагерь ВПЛ", "детское пространство"], "tagColors": ["amber", "gray", "teal"], "avatarBg": "#FAEEDA", "avatarColor": "#854F0B", "story": "Когда деревня попала под удар, Оноринэ несколько недель пряталась с семьей в лесу. Потом они скитались — лагерь за лагерем. В Итури на тот момент было более 1,1 миллиона перемещенных женщин и детей. Они живут в лагерях, где почти нет доступа к базовым услугам. Дети лишены детства: им некогда играть, они вынуждены работать, чтобы помочь семье.\n\nВ лагере Кигонзэ, где обосновалась семья, Оноринэ наконец нашла место, где можно просто быть ребенком. Это Дружественное детям пространство, созданное ЮНИСЕФ.\n\nЗдесь безопасно и чисто. Дети играют, учатся, общаются. А еще их учат полезным вещам: как заботиться о здоровье, питании, гигиене. Постепенно — шаг за шагом — они выходят из того, что с ними сделала война. В лагере Кигонзэ семьи живут в тесноте. В таких условиях инфекционные болезни распространяются мгновенно. ЮНИСЕФ и партнеры обеспечивают непрерывность прививочных служб, чтобы дети получали все необходимые вакцины.", "outcome": "В лагере Оноринэ получила доступ к безопасному детскому пространству и базовым услугам при поддержке ЮНИСЕФ.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/vital-aid-displaced-children"}, {"name": "Samson", "anon": false, "age": "15 лет", "loc": "Восток ДРК", "tags": ["Эбола", "сирота", "образование"], "tagColors": ["red", "coral", "green"], "avatarBg": "#FCEBEB", "avatarColor": "#A32D2D", "story": "Во время вспышки Эболы Самсон потерял обоих родителей. Сам переболел. Выжил. После лечения к нему приставили психологов. «Благодаря советам психологов я понял: моя история распалась на части, чтобы я мог собрать ее заново».\n\nСейчас Самсон живет со старшим братом. Он учится в третьем классе средней школы. А когда школу закрыли из-за коронавируса, он пошел в профессиональный центр, который поддерживает ЮНИСЕФ. Три раза в неделю подростки учатся стричь волосы — чтобы получить навык, который принесет доход.\n\nСамсон полон решимости добиться успеха. Он успевает и учиться, и осваивать профессию.\n\n«Мой отец и мать отдали мне всё, ценой своих жизней. Я хочу в свою очередь помогать моим младшим братьям и сестрам».", "outcome": "После смерти родителей Самсон получил психологическую помощь и возможность продолжить учебу благодаря программам ЮНИСЕФ.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/ebola-new-start-thanks-school"}, {"name": "Prisca", "anon": false, "age": "17 лет", "loc": "Южное Киву", "tags": ["сирота", "глава семьи", "денежная помощь"], "tagColors": ["coral", "amber", "green"], "avatarBg": "#FAECE7", "avatarColor": "#993C1D", "story": "Когда нападавшие пришли в ее деревню, Приска потеряла обоих родителей. Она осталась с двумя младшими братьями. В 17 лет она стала главой семьи.\n\nТри дня в неделю она работает в поле — чтобы добыть еду и деньги на самое необходимое. Она бросила учебу, потому что за ее школу больше некому платить.\n\nЮНИСЕФ в рамках программы быстрого реагирования перевел Приске 120 000 конголезских франков (около 75 долларов). Их можно потратить на еду, одежду, товары для дома или на бизнес. У Приски был план. «Я должна приумножить эту сумму, чтобы оплатить учебу в следующем году», — говорит она. Она хочет начать маленькую торговлю копченой рыбой. А потом — вернуться в школу. Приска мечтает стать медсестрой.", "outcome": "Денежная помощь ЮНИСЕФ дала Приске шанс содержать братьев и попытаться вернуться к учебе.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/cash-transfers-timely-help-prisca"}, {"name": "Charles", "anon": true, "age": "16 лет", "loc": "Южное Киву", "tags": ["похищение", "принудительный труд", "реинтеграция"], "tagColors": ["red", "amber", "teal"], "avatarBg": "#FCEBEB", "avatarColor": "#A32D2D", "story": "Чарльз пас коз с младшим братом, когда их схватили. Вооруженные люди направили на него оружие и приказали следовать за ними, младшего брата отпустили домой. В лагере вооруженной группы Чарльз вместе с другими похищенными детьми чистил одежду и обувь, стоял на блокпостах, собирал деньги с водителей. Иногда им приказывали забирать вещи у прохожих.\n\nНесколько недель спустя — благодаря работе общественных лидеров и сети защиты детей (при поддержке ЮНИСЕФ) — Чарльза удалось освободить. Он воссоединился с родителями и братом.\n\nПервые месяцы были трудными. «Друзья боялись меня. Они думали, что я стал жестоким. И это было не совсем неправдой», — говорит Чарльз. «Но благодаря консультациям я снова стал спокойным и уважительным».\n\nСейчас Чарльз в третьем классе средней школы. У него есть два лучших друга. «Их присутствие помогает мне снова чувствовать себя обычным ребенком: свободным и счастливым».", "outcome": "После освобождения Чарльз смог вернуться в семью, получить консультации и снова пойти в школу.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/charles-naomie-daniels-journeys-resilience"}, {"name": "Naomie", "anon": true, "age": "14 лет", "loc": "Южное Киву", "tags": ["похищение", "принудительный труд", "школа"], "tagColors": ["red", "amber", "green"], "avatarBg": "#FBEAF0", "avatarColor": "#993556", "story": "Наоми собирала хворост, когда её схватили. Ее увезли примерно на 25 километров от родной деревни. Там, вместе с другими детьми, она была вынуждена готовить и выполнять всю домашнюю работу.\n\nЧерез месяц ее отпустили. Вернувшись домой, Наоми получила психосоциальную поддержку — через групповые занятия и индивидуальные консультации. Но возвращение не стерло травму мгновенно. «Сначала другие дети боялись нас. Я чувствовала себя изолированной. Все видели во мне опасную девочку», — говорит Наоми. Но семья дала ей силы верить, что всё наладится.\n\nСегодня она снова в школе — в 8-м классе. «Сейчас я чувствую себя очень позитивно, — говорит Наоми. — Я хожу в школу, у меня много друзей, и даже люди в деревне снова начинают меня уважать».", "outcome": "После возвращения Наоми получила психосоциальную поддержку и смогла снова учиться.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/charles-naomie-daniels-journeys-resilience"}, {"name": "Daniel", "anon": true, "age": "14 лет", "loc": "Южное Киву", "tags": ["похищение", "принудительный труд", "мечта"], "tagColors": ["red", "amber", "teal"], "avatarBg": "#FCEBEB", "avatarColor": "#A32D2D", "story": "Даниэля схватили в нескольких метрах от собственного дома. Несколько недель он провел в лесном лагере вооружённой группы: охранял традиционные лекарства, помогал собирать деньги с водителей на блокпостах.\n\nПосле освобождения он вернулся домой. Получил психосоциальную и образовательную поддержку — в безопасном пространстве, где помогают таким же детям. Его семья и друзья тоже сыграли большую роль.\n\nВ школе Даниэль открыл для себя химию. «Я хочу узнать, как делают лекарства, и хочу стать фармацевтом, чтобы помогать другим», — говорит он. Лекарства, которые он охранял против воли, теперь он хочет раздавать по своей воле.", "outcome": "После освобождения Даниэль получил поддержку и вернулся к учебе.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/charles-naomie-daniels-journeys-resilience"}, {"name": "Pascaline", "anon": false, "age": "15 лет", "loc": "Махаги, Итури", "tags": ["перемещение", "разлучение с семьей", "образование"], "tagColors": ["amber", "coral", "green"], "avatarBg": "#FAEEDA", "avatarColor": "#854F0B", "story": "Паскалин бежала из деревни Мокамбо после вооруженного нападения. Некоторые воспоминания до сих пор слишком ярки: «Грейс и Ниме отрубили головы», — тихо говорит она, вспоминая одноклассниц.\n\nВ суматохе она потеряла связь с родителями и пятью братьями и сестрами. Сейчас живет с младшей сестрой в принимающей семье. От остальных братьев и сестер — ни слуху ни духу. Детство оборвалось. Школа исчезла из жизни.\n\nА потом радио принесло объявление, которое всё изменило: дети могут вернуться в школу. Принимающая семья отвела Паскалин и ее младшую сестру в начальную школу, которую поддерживает ЮНИСЕФ. Из-за пропущенных лет учебы она поначалу отставала. Но дополнительные занятия, поддерживающие учителя, безопасная среда — помогли ей вернуть уверенность.\n\n«Сейчас я наверстываю упущенное. Я даже могу прочитать текст без труда, — говорит она с гордостью. — Мне нравится школа, потому что это будущее. Я хочу стать учителем».", "outcome": "Школа при поддержке ЮНИСЕФ помогла Паскалин вернуться к учебе после перемещения и разлуки с семьей.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/ensuring-education-continuity-children-affected-conflict"}, {"name": "Timi", "anon": false, "age": "3 года", "loc": "Лагерь Бухимба-Мабанга, Северное Киву", "tags": ["холера", "экстренная помощь", "выздоровление"], "tagColors": ["red", "amber", "teal"], "avatarBg": "#FCEBEB", "avatarColor": "#A32D2D", "story": "Семья Тими бежала от насилия из деревни Килолирве. Они оказались в лагере Бухимба-Мабанга, где по прибытии не было ни душа, ни туалетов. В антисанитарных условиях трехлетняя Тими заболела холерой.\n\nРвота, диарея — маленькое тело обезвоживалось быстро.\n\nСоседка по лагерю, Алин, сама беженка, незадолго до этого получила от сотрудников ЮНИСЕФ и Красного Креста растворы от обезвоживания и наборы для борьбы с холерой. Этот простой жест спас Тими. Ее быстро отвезли в центр лечения холеры в Бухимбе. Четыре дня лечения — и Тими поправилась.", "outcome": "Быстрая помощь, наборы от ЮНИСЕФ и лечение в центре холеры помогли Тими выздороветь.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/neighbours-swift-action-puts-little-girl-road-recovery-cholera"}, {"name": "Jeanne", "anon": false, "age": "19 месяцев", "loc": "Валикале, Северное Киву", "tags": ["недоедание", "лечебное питание", "здоровье"], "tagColors": ["amber", "green", "teal"], "avatarBg": "#FAEEDA", "avatarColor": "#854F0B", "story": "В Валикале почти каждый второй ребенок до пяти лет страдает задержкой роста или хроническим недоеданием. Чтобы выявлять детей на ранней стадии, работают группы поддержки питания для младенцев и маленьких детей.\n\nВ одной из таких групп заметили 19-месячную Жанну — у нее были признаки недоедания. Ее быстро направили в ближайший медицинский центр. Там обученные работники дали ей лечебное питание. Сейчас Жанна здорова, но сотрудники продолжают наблюдать за ней, чтобы убедиться, что она достигает нужных весовых показателей.", "outcome": "Жанну вовремя направили в медцентр, где она получила лечебное питание и восстановилась.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/combating-malnutrition-walikale"}, {"name": "Eveline", "anon": false, "age": "14 месяцев", "loc": "Валикале, Северное Киву", "tags": ["недоедание", "грудное вскармливание", "лечение"], "tagColors": ["amber", "coral", "green"], "avatarBg": "#FAEEDA", "avatarColor": "#854F0B", "story": "Когда Эвелин исполнилось 12 месяцев, мать перестала кормить ее грудью. Девочка быстро начала терять вес. «У нее опухли щеки, а волосы обесцветились», — вспоминает мама Сакина.\n\nЭвелин попала в программу по борьбе с недоеданием. Ее определили в интенсивное отделение питания, где она получала терапевтическое молоко. Через шесть дней состояние улучшилось и ее перевели в амбулаторное отделение.", "outcome": "Эвелин попала в программу лечения недоедания и быстро пошла на поправку.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/combating-malnutrition-walikale"}, {"name": "Rwisiya", "anon": false, "age": "3 года", "loc": "Rvanguba, Северное Киву", "tags": ["тяжелое недоедание", "барьеры доступа", "бесплатная помощь"], "tagColors": ["red", "amber", "teal"], "avatarBg": "#FCEBEB", "avatarColor": "#A32D2D", "story": "У Рвисии поднялась высокая температура, отекли ноги и щеки. Мать, Никузе, перепробовала все возможные домашние средства — ничего не помогало.\n\nОна знала, что нужна больница. Но у семьи не было денег. Никузе колебалась и ждала. Потом пришел общинный работник. Увидев отеки на ногах девочки, он забил тревогу. У него был с собой ваучер, который покрывал стоимость лечения. Он сразу отвёз Рвисию в медицинский центр в Кабинди.\n\nДиагноз: тяжелое острое недоедание. Рвисию госпитализировали на неделю. Пока дочка поправлялась, Никузе ходила на образовательные беседы и кулинарные мастер-классы в медцентре. Ее научили, как готовить сбалансированную еду.", "outcome": "Бесплатный ваучер на лечение помог Рвисии вовремя попасть в больницу и восстановиться.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/improving-child-nutrition"}, {"name": "Freddy", "anon": false, "age": "12 лет", "loc": "Танганьика", "tags": ["нападение", "ожоги", "ребёнок без сопровождения"], "tagColors": ["red", "amber", "coral"], "avatarBg": "#FCEBEB", "avatarColor": "#A32D2D", "story": "Апрель 2017 года. Фредди был дома один. Мать с младшим братом ушли за маниокой, отец уже несколько дней был в поездке.\n\nПришли ополченцы. Они подожгли дом. Фредди не мог выбраться на улицу. Он получил тяжелые ожоги правой лопатки. «Я кричал и плакал».\n\nКогда ополченцев вытеснили из деревни, один сельчанин зашел в горящий дом, вытащил Фредди и доверил его группе людей, бежавших от насилия. Группа добралась до Калемие, столицы провинции Танганьика. Они поселились на территории школы, но Фредди не получал медицинской помощи. Ожог быстро инфицировался.\n\nОбщинный работник заметил Фредди и передал местному партнеру ЮНИСЕФ. Фредди положили в общую больницу Калемие. Через три месяца он присоединился к приемной семье и пошел в начальную школу.\n\n«Всё изменилось для меня», — говорит Фредди. Он до сих пор не знает, что случилось с его родителями и младшим братом.", "outcome": "ЮНИСЕФ помог организовать лечение Фредди, найти приемную семью и вернуть его в школу.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/children-injured-and-displaced-inter-ethnic-violence"}, {"name": "Tshibola Zobolayi", "anon": false, "age": "10 лет", "loc": "Касаи", "tags": ["вооруженная группа", "лес", "приемная семья"], "tagColors": ["red", "amber", "teal"], "avatarBg": "#FAECE7", "avatarColor": "#993C1D", "story": "В 2016 году в деревне Касуи начались столкновения между ополчением Камуина Нсапу и правительственными войсками. Семья Циболы бежала в лес. В суматохе она потерялась.\n\nДевочка попала к вооруженной группе. Два месяца она была свидетелем того, что не должен видеть никто, тем более десятилетний ребенок. «Я видела, как убивают людей», — говорит она. Обезглавленные тела, головы у похитителей на руках.\n\nОднажды командир приказал ей отнести воду бойцам недалеко от лагеря. Цибола воспользовалась моментом и убежала в лес. Месяцами она пряталась в густой растительности, боясь выйти — вдруг ее снова схватят.\n\nКогда обстановка успокоилась, Цибола покинула лес, чтобы искать семью. Родителей и братьев она не нашла, но встретила двух сестер. Их троих устроили в приемную семью и снова записали в школу.\n\nЕе прошлая школа была разрушена, ЮНИСЕФ установил временные классы, построил туалеты, раздал учебные материалы. Мечта Циболы — закончить учебу и стать гуманитарным работником, чтобы помогать уязвимым детям.", "outcome": "После побега Цибола нашла сестер, попала в приемную семью и вернулась к учебе благодаря поддержке ЮНИСЕФ.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/getting-back-school-violence-tshibola"}, {"name": "Fadhili", "anon": false, "age": "28 лет", "loc": "Гома, Северное Киву", "tags": ["бывший детский солдат", "реинтеграция", "медицина"], "tagColors": ["red", "teal", "green"], "avatarBg": "#FCEBEB", "avatarColor": "#A32D2D", "story": "В 16 лет Фадили возвращался из школы с одноклассниками. Их перехватили вооруженные люди и насильно забрали в лес. Фадили умел читать и писать — его назначили секретарем, он вел отчеты и протоколы собраний.\n\nВ декабре 2007 года регулярная армия атаковала лагерь. Повстанцев захватили, а Фадили как несовершеннолетнего перевели в транзитный центр при поддержке ЮНИСЕФ. Потом его ждала принимающая семья в Гоме. Приемная семья подарила ему чукуду — деревянный велосипед для перевозки грузов. По утрам он учился, по вечерам возил товары, чтобы заработать на жизнь.\n\nТак он прошел через университет и стал медбратом. Сейчас работает в местном медцентре и учится на педиатра. «Мое самое большое желание — помогать детям».", "outcome": "После демобилизации Фадили прошел через реинтеграцию, получил образование и стал медбратом.", "source": "ЮНИСЕФ", "sourceShort": "ЮНИСЕФ", "sourceColor": "#0F6E56", "sourceBg": "#E1F5EE", "url": "https://www.unicef.org/drcongo/en/stories/weapon-stethoscope-fadhili-former-child-soldier"}];
const tagColorMap = {
  red:'#FCEBEB|#A32D2D', coral:'#FAECE7|#993C1D', amber:'#FAEEDA|#854F0B',
  teal:'#E1F5EE|#0F6E56', green:'#EAF3DE|#3B6D11', purple:'#EEEDFE|#534AB7',
  pink:'#FBEAF0|#993556', gray:'#F1EFE8|#5F5E5A', blue:'#E6F1FB|#185FA5'
};

function sendHeight(){
  const body = document.body;
  const html = document.documentElement;
  const height = Math.max(
    body.scrollHeight,
    body.offsetHeight,
    html.scrollHeight,
    html.offsetHeight,
    html.clientHeight
  );
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'drc-iframe-height', height: height }, '*');
  }
}

let idx = 0;
function tagStyle(c){ const p=tagColorMap[c]?.split('|')||['#F1EFE8','#5F5E5A']; return `background:${p[0]};color:${p[1]}`; }
function go(d){ idx=Math.max(0,Math.min(stories.length-1,idx+d)); render(); setTimeout(sendHeight, 50); setTimeout(sendHeight, 250); }
function toggleStory(){ const wrap=document.querySelector('.story-wrap'); const btn=document.getElementById('expandBtn'); if(!wrap||!btn) return; wrap.classList.toggle('expanded'); btn.textContent = wrap.classList.contains('expanded') ? 'Свернуть' : 'Развернуть'; setTimeout(sendHeight, 50); setTimeout(sendHeight, 250); }
function makePreview(text){ if(text.length <= 260) return text; const cut = text.slice(0,260); const last = Math.max(cut.lastIndexOf('. '), cut.lastIndexOf('— '), cut.lastIndexOf(' ')); return (last > 140 ? cut.slice(0,last) : cut).trim() + '…'; }
function render(){
  const s = stories[idx];
  document.getElementById('navCount').textContent = `${idx+1} из ${stories.length}`;
  document.getElementById('btnPrev').disabled = idx===0;
  document.getElementById('btnNext').disabled = idx===stories.length-1;
  const initials = s.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const tagsHtml = s.tags.map((t,i)=>`<span class="tag" style="${tagStyle(s.tagColors[i])}">${t}</span>`).join('');
  const preview = makePreview(s.story);
  document.getElementById('cardArea').innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="avatar" style="background:${s.avatarBg};color:${s.avatarColor}">${initials}</div>
        <div style="flex:1">
          <div class="name-row">
            <span class="p-name">${s.name}</span>
            ${s.anon?'<span class="p-anon">имя изменено</span>':''}
          </div>
          <div class="p-meta">${s.age} &nbsp;·&nbsp; ${s.loc}</div>
        </div>
      </div>
      <div class="tags">${tagsHtml}</div>
      <div class="story-wrap">
        <div class="story story-preview">${preview.replace(/\n/g,'<br>')}</div>
        <div class="story story-full">${s.story.replace(/\n/g,'<br>')}</div>
        ${s.story.length>260?'<button class="expand-btn" id="expandBtn" onclick="toggleStory()">Развернуть</button>':''}
      </div>
      <div class="outcome" style="background:#E1F5EE">
        <div class="outcome-icon" style="border-color:#0F6E56">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <div class="outcome-text" style="color:#0F6E56">${s.outcome}</div>
      </div>
      <div class="source-row">
        <span class="source-badge" style="background:${s.sourceBg};color:${s.sourceColor}">${s.sourceShort}</span>
        <span style="font-size:12px;color:#4f4f4f">${s.source}</span>
        <a class="source-link" href="${s.url}" target="_blank">читать подробнее</a>
      </div>
    </div>`;
}
window.addEventListener('load', function(){ sendHeight(); setTimeout(sendHeight, 100); setTimeout(sendHeight, 400); });
window.addEventListener('resize', sendHeight);

const pageObserver = new MutationObserver(function(){
  sendHeight();
});
pageObserver.observe(document.body, {
  childList: true,
  subtree: true,
  attributes: true,
  characterData: true
});

render();
setTimeout(sendHeight, 50);
setTimeout(sendHeight, 250);
</script>
